# https://fly.io/docs/reference/configuration/
# After clone: rename `app` (or run `fly apps create`) and set secrets from .env.example.

app = "tg-ticket-provider"
primary_region = "fra"

[build]
  dockerfile = "Dockerfile"

[env]
  PYTHONUNBUFFERED = "1"

# Bot uses Telegram long polling (nothing listens on internal_port). Fly needs an
# [http_service] to apply min_machines_running / autostop. Scale to one Machine once:
#   fly scale count 1
[http_service]
  internal_port = 8080
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
